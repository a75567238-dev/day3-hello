<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 코드 어시스턴트 교육 프로그램</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f7f9fb;
        --surface: #ffffff;
        --surface-low: #f2f4f6;
        --surface-lowest: #ffffff;
        --surface-variant: #e0e3e5;
        --primary: #003d9b;
        --primary-container: #0052cc;
        --text: #191c1e;
        --text-muted: #434654;
        --outline: rgba(195, 198, 214, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", -apple-system, sans-serif;
        color: var(--text);
        background: var(--bg);
        line-height: 1.6;
      }

      .site-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .top-nav {
        position: sticky;
        top: 0;
        z-index: 20;
        margin: 16px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        backdrop-filter: blur(20px);
        background: color-mix(in srgb, var(--surface) 78%, transparent);
      }

      .top-nav__brand {
        font-family: "Manrope", "Inter", sans-serif;
        font-weight: 800;
        letter-spacing: -0.02em;
        font-size: 1.1rem;
      }

      .cta-link {
        text-decoration: none;
        color: #ffffff;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-container) 100%);
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 700;
        font-size: 0.95rem;
        border: 1px solid rgba(255, 255, 255, 0.25);
      }

      main {
        padding: 16px 16px 40px;
      }

      .section-card {
        width: min(980px, 100%);
        margin: 0 auto;
      }

      .hero {
        margin-top: 12px;
        padding: 34px 28px;
        background: var(--surface-lowest);
        border-radius: 24px;
      }

      .hero::before {
        content: "";
        display: block;
        height: 1px;
        width: 72px;
        background: var(--outline);
        margin-bottom: 18px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      .hero__title {
        margin-bottom: 14px;
        font-family: "Manrope", "Inter", sans-serif;
        font-size: clamp(2rem, 5.3vw, 3rem);
        line-height: 1.18;
        letter-spacing: -0.025em;
      }

      .hero__intro {
        color: var(--text-muted);
        margin-bottom: 28px;
        font-size: 1.05rem;
        max-width: 54ch;
      }

      .hero__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .hero__actions .cta-link {
        font-size: 1rem;
      }

      .cta-section {
        margin-top: 18px;
        background: var(--surface);
        border-radius: 22px;
        padding: 26px;
        min-height: 172px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        gap: 14px;
      }

      .cta-section h2 {
        font-family: "Manrope", "Inter", sans-serif;
        font-size: clamp(1.25rem, 3.2vw, 1.75rem);
        letter-spacing: -0.02em;
      }

      .cta-section p {
        color: var(--text-muted);
        max-width: 54ch;
      }

      @media (max-width: 760px) {
        .top-nav {
          margin: 10px;
          padding: 12px 14px;
        }

        .top-nav__brand {
          font-size: 1rem;
        }

        main {
          padding: 10px 10px 32px;
        }

        .hero,
        .cta-section {
          border-radius: 20px;
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="site-shell">
      <header class="top-nav section-card" aria-label="주요 내비게이션">
        <div class="top-nav__brand">AI 코드 어시스턴트 교육</div>
        <a class="cta-link" href="#cta">카카오톡으로 상담받기</a>
      </header>

      <main>
        <section class="section-card" id="hero-wrap">
          <section id="hero" class="hero" aria-label="메인 히어로">
            <h1 class="hero__title">비개발자도 이해하는 실전 AI 코드 어시스턴트</h1>
            <p class="hero__intro">실제 업무에 바로 반영할 수 있는 실습 위주의 교육으로, AI를 어렵게 느끼는 40대 학습자도 쉽게 시작할 수 있습니다.</p>
            <div class="hero__actions">
              <a class="cta-link" href="#cta">카카오톡으로 상담받기</a>
            </div>
          </section>
        </section>

        <section class="section-card" id="cta-wrap">
          <section id="cta" class="cta-section" aria-label="기본 상담 CTA">
            <h2>지금 바로 상담하고 시작해보세요.</h2>
            <p>카카오톡에서 상담 가능한 시간을 정해 정확한 학습 시작 전략을 안내해 드립니다.</p>
            <a class="cta-link" href="https://open.kakao.com/" target="_blank" rel="noopener noreferrer">카카오톡으로 상담받기</a>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
